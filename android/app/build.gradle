apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services" // Firebase

/**
 * РАСШИРЕННАЯ КОНФИГУРАЦИЯ REACT NATIVE
 * Сохраняем все пути, чтобы сборка не «теряла» модули
 */
def hermesEnabled = findProperty('hermesEnabled')?.toString() ?: "true"

def isNewArchitectureEnabled() {
    return (findProperty('newArchEnabled')?.toBoolean() ?: false)
}

def hermescAbsDir = file("../../node_modules/react-native/sdks/hermesc").canonicalPath

react {
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")

    debuggableVariants = ["debug"]

    bundleCommand = "bundle"
    bundleAssetName = "SecureCallApp.bundle"
    entryFile = file("../../index.js")

    hermesCommand = "${hermescAbsDir}/%OS-BIN%/hermesc"
}

// --- добавлено: читаем ENV переменные системы (Windows PowerShell SetEnvironmentVariable)
def env = System.getenv()

/**
 * ПАРАМЕТРЫ СБОРКИ
 */
def enableProguardInReleaseBuilds = true // Оставляем true для оптимизации и защиты
def jscFlavor = 'org.webkit:android-jsc:r250230'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.securecallapp"

    // Java 21 для лучшей совместимости (поддерживается Android 15)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    defaultConfig {
        applicationId "com.securecallapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        
        // Обновленные версии из твоего запроса
        versionCode 11
        versionName "11.0"
        
        multiDexEnabled true // Важно для предотвращения крашей на Xiaomi при старте

        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
        buildConfigField "boolean", "IS_HERMES_ENABLED", (findProperty('hermesEnabled')?.toBoolean() ?: true).toString()
        
        // ═══════════════════════════════════════════════════════════
        // ИСПРАВЛЕНО: Убраны ndk.abiFilters - используем только splits.abi
        // ВОЗВРАЩЕНО: Явное указание архитектур необходимо для фикса 
        // отсутствия libreact_featureflagsjni.so и JNI зависимостей в RN 0.77+
        // ═══════════════════════════════════════════════════════════
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            // читаем имя файла keystore из ENV (если задано)
            def storeFileName = env["RELEASE_STORE_FILE"]?.trim()
            if (storeFileName) {
                def storeFilePath = file("$rootDir/app/${storeFileName}")

                // если файла нет — бросаем понятную ошибку (чтобы не собирать unsigned release случайно)
                if (!storeFilePath.exists()) {
                    throw new GradleException("Keystore not found at: ${storeFilePath}. Установите RELEASE_STORE_FILE или поместите keystore в android/app/")
                }

                storeFile storeFilePath
                storePassword env["RELEASE_STORE_PASSWORD"]
                keyAlias env["RELEASE_KEY_ALIAS"]
                keyPassword env["RELEASE_KEY_PASSWORD"]
                storeType 'pkcs12'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
        release {
            // Используем release ключи если они есть (в ENV RELEASE_STORE_FILE), иначе debug
            if (env["RELEASE_STORE_FILE"]?.trim()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            shrinkResources enableProguardInReleaseBuilds
        }
    }

    // ═══════════════════════════════════════════════════════════
    // КРИТИЧНО: Splits по ABI — все платформы для кросс-совместимости
    // Включены x86/x86_64 для эмуляторов и устройств ChromeOS/Intel
    // ═══════════════════════════════════════════════════════════
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true
        }
    }

    packaging {
        // ═══════════════════════════════════════════════════════════
        // КРИТИЧНО ДЛЯ ANDROID 15 (16KB PAGE SIZE):
        // useLegacyPackaging = true заставляет AGP упаковывать .so файлы
        // в сжатом виде. При установке система ИЗВЛЕКАЕТ их на диск
        // и выравнивает по границе страницы (16KB). Это обходит
        // SIGSEGV (SEGV_ACCERR) в ElfReader::LoadSegments, вызванный
        // тем, что ELF-сегменты в .so имеют p_align=4096 (4KB),
        // несовместимый с 16KB page size при прямом mmap из APK.
        // ═══════════════════════════════════════════════════════════
        jniLibs {
            useLegacyPackaging = true

            pickFirsts += [
                'lib/x86/libc++_shared.so',
                'lib/x86_64/libc++_shared.so',
                'lib/armeabi-v7a/libc++_shared.so',
                'lib/arm64-v8a/libc++_shared.so',
                '**/libc++_shared.so',
                '**/libfbjni.so',
                // libjsc.so УБРАН из pickFirsts — он уже исключён в resources.excludes ниже.
                // При hermesEnabled=true JSC не используется вообще.
                // pickFirsts + excludes на один файл — противоречивые инструкции.
                '**/libreactnativejni.so',
                '**/libhermes.so',
                '**/libwebrtc.so',
                '**/libreact_featureflagsjni.so'
            ]

            keepDebugSymbols += ['**/libhermes.so', '**/libreactnativejni.so']
        }
        
        resources {
            excludes += [
                '**/libjsc.so',
                'META-INF/androidx.core_core.version',
                'META-INF/androidx.customview_customview.version',
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/license.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/notice.txt',
                'META-INF/ASL2.0',
                'META-INF/*.kotlin_module'
            ]
            
            // КРИТИЧНО: pickFirst для конфликтующих ресурсов
            pickFirsts += [
                'META-INF/AL2.0',
                'META-INF/LGPL2.1'
            ]
        }
    }
}

dependencies {
    // Ядро React Native
    implementation("com.facebook.react:react-android")

    // Выбор движка: Hermes или JSC
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Стандартные библиотеки Kotlin и AndroidX
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    // ═══════════════════════════════════════════════════════════
    // РУЧНОЕ ПОДКЛЮЧЕНИЕ МОДУЛЕЙ
    // ═══════════════════════════════════════════════════════════
    implementation project(':react-native-webrtc')
    implementation project(':notifee_react-native')
    implementation project(':react-native-firebase_app')
    implementation project(':react-native-firebase_messaging')
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-reanimated')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-image-picker')

    // Навигация
    implementation 'androidx.navigation:navigation-fragment-ktx:2.7.7'
    implementation 'androidx.navigation:navigation-ui-ktx:2.7.7'

    /**
     * FIREBASE CONFIGURATION
     *
     * firebase-bom:34.9.0 УБРАН — react-native-firebase 19.3.0 сам управляет
     * BOM (32.8.1) через свой Gradle-плагин. Принудительное переопределение
     * создавало конфликт версий.
     *
     * firebase-messaging подключён БЕЗ явной версии — он нужен напрямую в
     * classpath app-модуля: MyFirebaseMessagingService наследует FirebaseMessagingService,
     * но project(':react-native-firebase_messaging') использует `implementation`
     * (не `api`), поэтому его зависимости НЕ видны в app-модуле автоматически.
     * Версию разрешает BOM, который транзитивно тянет react-native-firebase_app.
     */
    implementation 'com.google.firebase:firebase-messaging'
}

// Блок -Xlint:deprecation УДАЛЁН.
// Он принудительно включал подробный вывод обо всех deprecated-вызовах
// во ВСЕХ Java-задачах (включая зависимости), что засоряло лог сборки.
// Нативные //noinspection и @SuppressWarnings в Java-коде достаточны.