// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        
        // Используем NDK r27 (Clang 17) из нового конфига
        ndkVersion = "27.2.12479018" 
        
        // Используем более свежий Kotlin из старого конфига
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP 8.7.2 поддерживает Android 15 и 16KB page size
        classpath("com.android.tools.build:gradle:8.7.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        
        // Самая свежая версия Google Services
        classpath("com.google.gms:google-services:4.4.4")
    }
    
    // Решение проблем с BouncyCastle (Java 21 compatibility)
    configurations.all {
        resolutionStrategy {
            force 'org.bouncycastle:bcprov-jdk18on:1.76'
            force 'org.bouncycastle:bcpkix-jdk18on:1.76'
            force 'org.bouncycastle:bcutil-jdk18on:1.76'
        }
    }
}

// Закомментировано для использования явного управления версиями
// apply plugin: "com.facebook.react.rootproject"

// ─────────────────────────────────────────────────────────────────────────────
// КРИТИЧЕСКИЙ ФИКС ДЛЯ KOTLIN 1.9.x (из вашего старого файла)
// Исправляет ошибки "Type argument is not within its bounds" в сторонних библиотеках
// ─────────────────────────────────────────────────────────────────────────────
subprojects {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            freeCompilerArgs += [
                "-XXLanguage:-ProhibitUsingNullableTypeParameterAgainstNotNullAnnotated",
                "-XXLanguage:-ForbidInferringTypeVariablesIntoEmptyIntersection",
            ]
        }
    }

    // ═══════════════════════════════════════════════════════════
    // ИСПРАВЛЕНИЕ ДЛЯ WEBRTC: Принудительное извлечение .so файлов
    // Это гарантирует, что packagingOptions применяются к sub-project,
    // решая нативный крэш SIGSEGV на устройствах с 16KB page size.
    // ═══════════════════════════════════════════════════════════
    if (project.name == "react-native-webrtc") {
        afterEvaluate {
            android {
                packagingOptions {
                    jniLibs {
                        useLegacyPackaging true
                    }
                }
            }
        }
    }
}

allprojects {
    repositories {
        // Локальные репозитории для React Native и Notifee
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/@notifee/react-native/android/libs") }
        
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
    
    // Принудительная стратегия разрешения зависимостей для всех подпроектов
    configurations.all {
        resolutionStrategy {
            // Дублируем force для надежности во всех модулях
            force 'org.bouncycastle:bcprov-jdk18on:1.76'
            force 'org.bouncycastle:bcpkix-jdk18on:1.76'
            force 'org.bouncycastle:bcutil-jdk18on:1.76'
            
            // Фиксируем AndroidX Core для предотвращения конфликтов версий
            force 'androidx.core:core:1.12.0'
            force 'androidx.core:core-ktx:1.12.0'

            // ПРИНУДИТЕЛЬНО УКАЗЫВАЕМ ВЕРСИЮ REACT NATIVE ДЛЯ ВСЕХ МОДУЛЕЙ
            force 'com.facebook.react:react-android:0.77.3'
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
