// ═══════════════════════════════════════════════════════════
// settings.gradle — React Native 0.77.x
//
// ПОРЯДОК БЛОКОВ (критично для Gradle 8.8):
// Gradle 8.8 требует строгой последовательности в settings.gradle:
//   1. pluginManagement {}
//   2. plugins {}
//   3. всё остальное (includeBuild, extensions.configure, include и т.д.)
//
// ДВА includeBuild — зачем оба:
//   pluginManagement.includeBuild → резолвит id("com.facebook.react.settings")
//   top-level includeBuild        → резолвит classpath("...react-native-gradle-plugin")
//                                   без версии в корневом build.gradle через
//                                   composite build substitution.
// Gradle дедуплицирует их автоматически.
// ═══════════════════════════════════════════════════════════

pluginManagement {
    includeBuild('../node_modules/@react-native/gradle-plugin')
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

// ─── Всё ниже — после plugins{}, как требует Gradle 8.8 ───────────────────────

// Резолвит classpath("com.facebook.react:react-native-gradle-plugin") без версии
// в buildscript{} корневого build.gradle через composite build substitution.
includeBuild('../node_modules/@react-native/gradle-plugin')

// autolinkLibrariesFromCommand() заменяет applyNativeModulesSettingsGradle().
// Регистрирует автолинкинг как Gradle-задачу (не синхронно в settings eval),
// что устраняет зависание на 0%.
// Полное имя класса обязательно в Groovy DSL.
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'SecureCallApp'
include ':app'
